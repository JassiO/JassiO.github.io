<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maskenball 2026 – Gästeliste & Glücksrad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --burgundy-deepest:#2c0e18;
    --burgundy-deep:#3d1220;
    --burgundy:#5c1a2e;
    --burgundy-light:#7a2c42;
    --gold:#d4b96a;
    --gold-soft:#c9a961;
    --gold-deep:#a9822f;
    --cream:#ecdfc0;
    --cream-dim:#d9caa4;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% 0%, var(--burgundy) 0%, var(--burgundy-deep) 55%, var(--burgundy-deepest) 100%);
    color:var(--cream);
    font-family:'Cormorant Garamond', serif;
    display:flex;
    justify-content:center;
    padding:24px 14px 60px;
  }

  .frame{
    position:relative;
    width:100%;
    max-width:640px;
  }

  .corner{
    position:absolute;
    width:56px;
    height:56px;
    pointer-events:none;
    opacity:.85;
    z-index:2;
  }
  .corner svg{ width:100%; height:100%; }
  .corner-tl{ top:-6px; left:-6px; }
  .corner-tr{ top:-6px; right:-6px; transform:scaleX(-1); }
  .corner-bl{ bottom:-6px; left:-6px; transform:scaleY(-1); }
  .corner-br{ bottom:-6px; right:-6px; transform:scale(-1,-1); }

  header{
    text-align:center;
    padding:34px 10px 18px;
  }

  .divider{
    display:flex;
    align-items:center;
    gap:14px;
    justify-content:center;
    margin:0 auto 18px;
    max-width:280px;
  }
  .divider::before, .divider::after{
    content:'';
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .diamond{
    width:8px; height:8px;
    background:var(--gold);
    transform:rotate(45deg);
    box-shadow:0 0 6px rgba(212,185,106,.6);
  }

  h1{
    font-family:'Cinzel', serif;
    font-weight:700;
    letter-spacing:.12em;
    font-size:clamp(28px, 7vw, 42px);
    margin:0;
    color:var(--cream);
    text-shadow:0 0 18px rgba(212,185,106,.25);
  }
  h1 small{
    display:block;
    font-size:.62em;
    letter-spacing:.2em;
    color:var(--gold);
    margin-top:4px;
  }

  .subtitle{
    font-style:italic;
    color:var(--cream-dim);
    letter-spacing:.03em;
    margin:10px 0 0;
    font-size:16px;
  }

  main{
    display:flex;
    flex-direction:column;
    gap:22px;
    padding:0 4px 10px;
  }

  .card{
    background:linear-gradient(180deg, rgba(255,255,255,.03), transparent), var(--burgundy-deep);
    border:1px solid rgba(212,185,106,.35);
    border-radius:6px;
    padding:22px 20px 24px;
    position:relative;
  }
  .card::before{
    content:'';
    position:absolute;
    inset:6px;
    border:1px solid rgba(212,185,106,.15);
    border-radius:3px;
    pointer-events:none;
  }

  h2{
    font-family:'Cinzel', serif;
    font-size:19px;
    letter-spacing:.08em;
    color:var(--gold);
    margin:0 0 16px;
    font-weight:500;
  }

  /* --- Gästeliste --- */
  #addForm{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }
  input[type="text"], input[type="number"], select{
    background:var(--burgundy-deepest);
    border:1px solid var(--gold-deep);
    color:var(--cream);
    font-family:'Cormorant Garamond', serif;
    font-size:16px;
    padding:10px 12px;
    border-radius:4px;
    outline:none;
  }
  input[type="text"]{ flex:1; min-width:0; }
  input:focus, select:focus, button:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:1px;
  }

  button{
    font-family:'Cinzel', serif;
    font-size:13px;
    letter-spacing:.06em;
    background:var(--gold);
    color:var(--burgundy-deepest);
    border:none;
    padding:10px 16px;
    border-radius:4px;
    cursor:pointer;
    transition:filter .15s ease, transform .1s ease;
    white-space:nowrap;
  }
  button:hover{ filter:brightness(1.1); }
  button:active{ transform:translateY(1px); }
  button.secondary{
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold-deep);
  }
  button:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .count{
    color:var(--cream-dim);
    font-size:15px;
    margin-bottom:14px;
    letter-spacing:.02em;
  }
  .count span{ color:var(--gold); font-weight:600; }

  ul#nameList{
    list-style:none;
    margin:0; padding:0;
    display:flex;
    flex-direction:column;
    gap:6px;
    max-height:260px;
    overflow-y:auto;
  }
  ul#nameList li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(0,0,0,.18);
    border-left:2px solid var(--gold-deep);
    padding:8px 10px 8px 14px;
    border-radius:3px;
    font-size:16px;
  }
  .del-btn{
    background:transparent;
    border:1px solid var(--gold-deep);
    color:var(--cream-dim);
    width:24px; height:24px;
    border-radius:50%;
    font-size:14px;
    line-height:1;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .del-btn:hover{
    background:var(--burgundy-light);
    color:var(--cream);
  }
  .empty-hint{
    color:var(--cream-dim);
    font-style:italic;
    font-size:15px;
    opacity:.7;
  }

  /* --- Teams --- */
  .team-controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom:16px;
  }
  .team-controls label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:15px;
    color:var(--cream-dim);
  }
  .team-controls input[type="number"]{ width:60px; }

  #teamsDisplay{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
    gap:10px;
  }
  .team-box{
    background:rgba(0,0,0,.18);
    border:1px solid rgba(212,185,106,.25);
    border-radius:4px;
    padding:10px 12px;
  }
  .team-box h3{
    font-family:'Cinzel', serif;
    font-size:13px;
    letter-spacing:.05em;
    color:var(--gold);
    margin:0 0 6px;
  }
  .team-box ul{ margin:0; padding:0; list-style:none; font-size:15px; }
  .team-box li{ padding:2px 0; color:var(--cream-dim); }
  .team-note{
    font-size:13px;
    color:var(--cream-dim);
    opacity:.7;
    margin-top:12px;
    font-style:italic;
  }

  /* --- Glücksrad --- */
  .wheel-controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom:20px;
  }
  .wheel-controls select{ min-width:170px; }

  .wheel-wrap{
    position:relative;
    width:min(320px, 82vw);
    aspect-ratio:1/1;
    margin:0 auto 18px;
  }
  #wheelCanvas{
    width:100%;
    height:100%;
    display:block;
    filter:drop-shadow(0 6px 18px rgba(0,0,0,.5));
  }
  .pointer{
    position:absolute;
    top:-4px;
    left:50%;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:11px solid transparent;
    border-right:11px solid transparent;
    border-top:18px solid var(--gold);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));
    z-index:3;
  }

  .winner-display{
    text-align:center;
    min-height:54px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
  }
  .winner-label{
    font-size:12px;
    letter-spacing:.15em;
    color:var(--gold-deep);
    text-transform:uppercase;
  }
  .winner-name{
    font-family:'Cinzel', serif;
    font-size:24px;
    color:var(--gold);
    opacity:0;
    transform:scale(.85);
    transition:opacity .4s ease, transform .4s ease;
  }
  .winner-name.show{
    opacity:1;
    transform:scale(1);
  }

  .msg{
    text-align:center;
    font-size:14px;
    color:var(--cream-dim);
    min-height:18px;
    margin-top:4px;
  }

  footer{
    text-align:center;
    padding:26px 10px 4px;
  }

  .reset-row{
    text-align:center;
    margin-top:6px;
  }
  .reset-row button{
    font-size:11px;
    padding:6px 12px;
  }

  @media (max-width:420px){
    .corner{ width:38px; height:38px; }
    header{ padding-top:26px; }
    .card{ padding:18px 14px 20px; }
  }
</style>
</head>
<body>

<div class="frame">
  <div class="corner corner-tl"><svg viewBox="0 0 100 100"><path d="M4 4 C4 40, 40 4, 60 4 M4 4 C40 4, 4 40, 4 60" fill="none" stroke="#d4b96a" stroke-width="2"/><circle cx="4" cy="4" r="3" fill="#d4b96a"/><path d="M18 4 C18 14, 8 14, 8 24" fill="none" stroke="#d4b96a" stroke-width="1.3"/></svg></div>
  <div class="corner corner-tr"><svg viewBox="0 0 100 100"><path d="M4 4 C4 40, 40 4, 60 4 M4 4 C40 4, 4 40, 4 60" fill="none" stroke="#d4b96a" stroke-width="2"/><circle cx="4" cy="4" r="3" fill="#d4b96a"/><path d="M18 4 C18 14, 8 14, 8 24" fill="none" stroke="#d4b96a" stroke-width="1.3"/></svg></div>
  <div class="corner corner-bl"><svg viewBox="0 0 100 100"><path d="M4 4 C4 40, 40 4, 60 4 M4 4 C40 4, 4 40, 4 60" fill="none" stroke="#d4b96a" stroke-width="2"/><circle cx="4" cy="4" r="3" fill="#d4b96a"/><path d="M18 4 C18 14, 8 14, 8 24" fill="none" stroke="#d4b96a" stroke-width="1.3"/></svg></div>
  <div class="corner corner-br"><svg viewBox="0 0 100 100"><path d="M4 4 C4 40, 40 4, 60 4 M4 4 C40 4, 4 40, 4 60" fill="none" stroke="#d4b96a" stroke-width="2"/><circle cx="4" cy="4" r="3" fill="#d4b96a"/><path d="M18 4 C18 14, 8 14, 8 24" fill="none" stroke="#d4b96a" stroke-width="1.3"/></svg></div>

  <header>
    <div class="divider"><span class="diamond"></span></div>
    <h1>Maskenball<small>der Spiele</small></h1>
    <p class="subtitle">Gästeliste, Teams & Glücksrad — Geburtstag Jasmin</p>
  </header>

  <main>
    <section class="card" aria-labelledby="guestheading">
      <h2 id="guestheading">Gästeliste</h2>
      <form id="addForm">
        <label for="nameInput" class="sr-only" style="position:absolute; left:-9999px;">Name</label>
        <input type="text" id="nameInput" placeholder="Name eingeben" autocomplete="off" maxlength="30">
        <button type="submit">Eintragen</button>
      </form>
      <div class="msg" id="listMsg" aria-live="polite"></div>
      <div class="count">Aktuell <span id="countNum">0</span> <span id="countLabel">Gäste</span> dabei</div>
      <ul id="nameList"></ul>
    </section>

    <section class="card" aria-labelledby="teamsheading">
      <h2 id="teamsheading">Teams auslosen</h2>
      <div class="team-controls">
        <label>Anzahl Teams
          <input type="number" id="teamCount" min="2" max="12" value="2">
        </label>
        <button id="shuffleTeams">Teams auslosen</button>
        <button id="clearTeams" class="secondary">Teams aufheben</button>
      </div>
      <div id="teamsDisplay"></div>
      <div class="team-note">Wer sich nach der Auslosung neu einträgt, ist erst beim nächsten Auslosen wieder in einem Team.</div>
    </section>

    <section class="card" aria-labelledby="wheelheading">
      <h2 id="wheelheading">Glücksrad</h2>
      <div class="wheel-controls">
        <label for="poolSelect">Auswahl aus</label>
        <select id="poolSelect"><option value="all">Alle Gäste</option></select>
        <button id="spinBtn">Rad drehen</button>
      </div>
      <div class="wheel-wrap">
        <canvas id="wheelCanvas" width="340" height="340"></canvas>
        <div class="pointer"></div>
      </div>
      <div class="winner-display" aria-live="polite">
        <span class="winner-label" id="winnerLabel" style="display:none;">Ausgewählt</span>
        <span class="winner-name" id="winnerName"></span>
      </div>
      <div class="msg" id="wheelMsg"></div>
    </section>

    <div class="reset-row">
      <button id="resetAll" class="secondary">Alles zurücksetzen</button>
    </div>
  </main>

  <footer>
    <div class="divider"><span class="diamond"></span></div>
  </footer>
</div>

<script>
(function(){
  "use strict";

  var STORAGE_NAMES = 'maskenball_names';
  var STORAGE_TEAMS = 'maskenball_teams';

  var names = [];
  var teams = [];
  try{ names = JSON.parse(localStorage.getItem(STORAGE_NAMES) || '[]'); }catch(e){ names = []; }
  try{ teams = JSON.parse(localStorage.getItem(STORAGE_TEAMS) || '[]'); }catch(e){ teams = []; }

  var addForm = document.getElementById('addForm');
  var nameInput = document.getElementById('nameInput');
  var nameList = document.getElementById('nameList');
  var countNum = document.getElementById('countNum');
  var countLabel = document.getElementById('countLabel');
  var listMsg = document.getElementById('listMsg');

  var teamCountInput = document.getElementById('teamCount');
  var shuffleTeamsBtn = document.getElementById('shuffleTeams');
  var clearTeamsBtn = document.getElementById('clearTeams');
  var teamsDisplay = document.getElementById('teamsDisplay');

  var poolSelect = document.getElementById('poolSelect');
  var spinBtn = document.getElementById('spinBtn');
  var wheelCanvas = document.getElementById('wheelCanvas');
  var wheelMsg = document.getElementById('wheelMsg');
  var winnerLabel = document.getElementById('winnerLabel');
  var winnerNameEl = document.getElementById('winnerName');
  var resetAllBtn = document.getElementById('resetAll');

  var ctx = wheelCanvas.getContext('2d');
  var currentRotation = 0;
  var spinTimeout = null;
  var msgTimeout = null;

  function saveNames(){ localStorage.setItem(STORAGE_NAMES, JSON.stringify(names)); }
  function saveTeams(){ localStorage.setItem(STORAGE_TEAMS, JSON.stringify(teams)); }

  function flashMsg(el, text, ms){
    el.textContent = text;
    clearTimeout(msgTimeout);
    if(ms){
      msgTimeout = setTimeout(function(){ el.textContent = ''; }, ms);
    }
  }

  function renderCount(){
    countNum.textContent = names.length;
    countLabel.textContent = names.length === 1 ? 'Gast' : 'Gäste';
  }

  function renderList(){
    nameList.innerHTML = '';
    if(names.length === 0){
      var li = document.createElement('li');
      li.className = 'empty-hint';
      li.style.border = 'none';
      li.style.background = 'transparent';
      li.textContent = 'Noch keine Gäste eingetragen.';
      nameList.appendChild(li);
      return;
    }
    names.forEach(function(name, idx){
      var li = document.createElement('li');
      var span = document.createElement('span');
      span.textContent = name;
      var btn = document.createElement('button');
      btn.className = 'del-btn';
      btn.setAttribute('aria-label', name + ' austragen');
      btn.textContent = '×';
      btn.addEventListener('click', function(){ deleteName(idx); });
      li.appendChild(span);
      li.appendChild(btn);
      nameList.appendChild(li);
    });
  }

  function addName(raw){
    var name = (raw || '').trim();
    if(!name){ return; }
    var exists = names.some(function(n){ return n.toLowerCase() === name.toLowerCase(); });
    if(exists){
      flashMsg(listMsg, '„' + name + '" ist schon in der Liste.', 3000);
      return;
    }
    names.push(name);
    saveNames();
    renderList();
    renderCount();
    updatePoolOptions();
    redrawWheel();
    flashMsg(listMsg, '', 0);
  }

  function deleteName(idx){
    var removed = names.splice(idx, 1)[0];
    saveNames();
    teams = teams.map(function(team){
      return team.filter(function(n){ return n !== removed; });
    });
    saveTeams();
    renderList();
    renderCount();
    renderTeams();
    updatePoolOptions();
    redrawWheel();
  }

  addForm.addEventListener('submit', function(e){
    e.preventDefault();
    addName(nameInput.value);
    nameInput.value = '';
    nameInput.focus();
  });

  // --- Teams ---
  function renderTeams(){
    teamsDisplay.innerHTML = '';
    if(teams.length === 0){
      var hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = 'Noch keine Teams ausgelost.';
      teamsDisplay.appendChild(hint);
      return;
    }
    teams.forEach(function(team, i){
      var box = document.createElement('div');
      box.className = 'team-box';
      var h3 = document.createElement('h3');
      h3.textContent = 'Team ' + (i + 1) + ' (' + team.length + ')';
      box.appendChild(h3);
      var ul = document.createElement('ul');
      team.forEach(function(name){
        var li = document.createElement('li');
        li.textContent = name;
        ul.appendChild(li);
      });
      box.appendChild(ul);
      teamsDisplay.appendChild(box);
    });
  }

  function shuffleArray(arr){
    var a = arr.slice();
    for(var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function doShuffleTeams(){
    if(names.length === 0){
      flashMsg(wheelMsg, '', 0);
      flashMsg(listMsg, 'Erst Namen eintragen.', 3000);
      return;
    }
    var n = parseInt(teamCountInput.value, 10) || 2;
    n = Math.max(2, Math.min(n, Math.max(2, names.length)));
    var shuffled = shuffleArray(names);
    teams = [];
    for(var i = 0; i < n; i++){ teams.push([]); }
    shuffled.forEach(function(name, idx){
      teams[idx % n].push(name);
    });
    saveTeams();
    renderTeams();
    updatePoolOptions();
    redrawWheel();
  }

  function doClearTeams(){
    teams = [];
    saveTeams();
    renderTeams();
    updatePoolOptions();
    redrawWheel();
  }

  shuffleTeamsBtn.addEventListener('click', doShuffleTeams);
  clearTeamsBtn.addEventListener('click', doClearTeams);

  // --- Pool select ---
  function updatePoolOptions(){
    var prev = poolSelect.value;
    poolSelect.innerHTML = '';
    var allOpt = document.createElement('option');
    allOpt.value = 'all';
    allOpt.textContent = 'Alle Gäste';
    poolSelect.appendChild(allOpt);
    teams.forEach(function(team, i){
      var opt = document.createElement('option');
      opt.value = 'team-' + i;
      opt.textContent = 'Team ' + (i + 1) + ' (' + team.length + ')';
      poolSelect.appendChild(opt);
    });
    var stillExists = Array.prototype.some.call(poolSelect.options, function(o){ return o.value === prev; });
    poolSelect.value = stillExists ? prev : 'all';
  }

  poolSelect.addEventListener('change', function(){
    resetWheelPosition();
    redrawWheel();
    hideWinner();
  });

  function getCurrentPool(){
    if(poolSelect.value === 'all'){ return names; }
    var idx = parseInt(poolSelect.value.replace('team-', ''), 10);
    return (teams[idx] || []);
  }

  // --- Wheel drawing ---
  function drawWheelSegments(pool){
    var size = wheelCanvas.width;
    var radius = size / 2;
    ctx.clearRect(0, 0, size, size);

    if(pool.length === 0){
      ctx.beginPath();
      ctx.arc(radius, radius, radius - 4, 0, Math.PI * 2);
      ctx.fillStyle = '#4a1626';
      ctx.fill();
      ctx.strokeStyle = '#d4b96a';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = '#ecdfc0';
      ctx.font = '18px "Cormorant Garamond", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Keine Namen', radius, radius);
      return;
    }

    var seg = (Math.PI * 2) / pool.length;
    var colors = ['#6d2038', '#4a1626'];
    pool.forEach(function(name, i){
      var start = -Math.PI / 2 + i * seg;
      var end = start + seg;
      ctx.beginPath();
      ctx.moveTo(radius, radius);
      ctx.arc(radius, radius, radius - 4, start, end);
      ctx.closePath();
      ctx.fillStyle = colors[i % 2];
      ctx.fill();
      ctx.strokeStyle = '#d4b96a';
      ctx.lineWidth = 2;
      ctx.stroke();

      var mid = start + seg / 2;
      ctx.save();
      ctx.translate(radius, radius);
      ctx.rotate(mid);
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ecdfc0';
      var fontSize = pool.length > 14 ? 10 : (pool.length > 8 ? 13 : 16);
      ctx.font = fontSize + 'px "Cormorant Garamond", serif';
      var label = name.length > 15 ? name.slice(0, 13) + '…' : name;
      ctx.fillText(label, radius - 16, 0);
      ctx.restore();
    });

    ctx.beginPath();
    ctx.arc(radius, radius, radius * 0.11, 0, Math.PI * 2);
    ctx.fillStyle = '#d4b96a';
    ctx.fill();
    ctx.strokeStyle = '#2c0e18';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function redrawWheel(){
    drawWheelSegments(getCurrentPool());
  }

  function resetWheelPosition(){
    wheelCanvas.style.transition = 'none';
    wheelCanvas.style.transform = 'rotate(0deg)';
    currentRotation = 0;
    void wheelCanvas.offsetWidth;
    wheelCanvas.style.transition = 'transform 3.2s cubic-bezier(.17,.67,.16,1.01)';
  }

  function hideWinner(){
    winnerLabel.style.display = 'none';
    winnerNameEl.classList.remove('show');
    winnerNameEl.textContent = '';
  }

  function spinWheel(){
    var pool = getCurrentPool();
    if(pool.length < 2){
      flashMsg(wheelMsg, 'Es werden mindestens 2 Namen in der Auswahl benötigt.', 3500);
      return;
    }
    hideWinner();
    flashMsg(wheelMsg, '', 0);
    spinBtn.disabled = true;

    var winnerIndex = Math.floor(Math.random() * pool.length);
    var segDeg = 360 / pool.length;
    var midDeg = winnerIndex * segDeg + segDeg / 2;
    var target = (360 - midDeg) % 360;
    var extraSpins = 4 + Math.floor(Math.random() * 3);
    var newRotation = currentRotation - (currentRotation % 360) + extraSpins * 360 + target;
    currentRotation = newRotation;

    wheelCanvas.style.transition = 'transform 3.2s cubic-bezier(.17,.67,.16,1.01)';
    wheelCanvas.style.transform = 'rotate(' + newRotation + 'deg)';

    clearTimeout(spinTimeout);
    spinTimeout = setTimeout(function(){
      winnerLabel.style.display = 'inline-block';
      winnerNameEl.textContent = pool[winnerIndex];
      requestAnimationFrame(function(){ winnerNameEl.classList.add('show'); });
      spinBtn.disabled = false;
    }, 3300);
  }

  spinBtn.addEventListener('click', spinWheel);

  resetAllBtn.addEventListener('click', function(){
    var ok = window.confirm('Wirklich alle Namen und Teams löschen?');
    if(!ok){ return; }
    names = [];
    teams = [];
    saveNames();
    saveTeams();
    renderList();
    renderCount();
    renderTeams();
    updatePoolOptions();
    resetWheelPosition();
    redrawWheel();
    hideWinner();
  });

  // --- Init ---
  renderList();
  renderCount();
  renderTeams();
  updatePoolOptions();
  wheelCanvas.style.transition = 'transform 3.2s cubic-bezier(.17,.67,.16,1.01)';
  redrawWheel();
})();
</script>
</body>
</html>
