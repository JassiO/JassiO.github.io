<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitspielen – Maskenball 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --burgundy-deepest:#2c0e18;
    --burgundy-deep:#3d1220;
    --burgundy:#5c1a2e;
    --burgundy-light:#7a2c42;
    --gold:#d4b96a;
    --gold-deep:#a9822f;
    --cream:#ecdfc0;
    --cream-dim:#d9caa4;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% 0%, var(--burgundy) 0%, var(--burgundy-deep) 55%, var(--burgundy-deepest) 100%);
    color:var(--cream);
    font-family:'Cormorant Garamond', serif;
    display:flex;
    justify-content:center;
    padding:24px 14px 60px;
  }

  .frame{
    position:relative;
    width:100%;
    max-width:640px;
  }

  .corner{
    position:absolute;
    width:56px;
    height:56px;
    pointer-events:none;
    opacity:.85;
    z-index:2;
  }
  .corner svg{ width:100%; height:100%; }
  .corner-tl{ top:-6px; left:-6px; }
  .corner-tr{ top:-6px; right:-6px; transform:scaleX(-1); }
  .corner-bl{ bottom:-6px; left:-6px; transform:scaleY(-1); }
  .corner-br{ bottom:-6px; right:-6px; transform:scale(-1,-1); }

  header{
    text-align:center;
    padding:34px 10px 18px;
  }

  .eyebrow{
    font-family:'Cinzel', serif;
    font-size:12px;
    letter-spacing:.25em;
    color:var(--gold-deep);
    text-transform:uppercase;
    margin-bottom:8px;
  }

  h1{
    font-family:'Cinzel', serif;
    font-weight:700;
    letter-spacing:.08em;
    font-size:clamp(24px, 6vw, 34px);
    margin:0;
    color:var(--cream);
    text-shadow:0 0 18px rgba(212,185,106,.25);
  }

  .intro{
    font-style:italic;
    color:var(--cream-dim);
    font-size:17px;
    line-height:1.5;
    max-width:420px;
    margin:14px auto 0;
  }

  .divider{
    display:flex;
    align-items:center;
    gap:14px;
    justify-content:center;
    margin:16px auto 0;
    max-width:280px;
  }
  .divider::before, .divider::after{
    content:'';
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .diamond{
    width:8px; height:8px;
    background:var(--gold);
    transform:rotate(45deg);
    box-shadow:0 0 6px rgba(212,185,106,.6);
  }

  main{
    display:flex;
    flex-direction:column;
    gap:20px;
    padding:20px 4px 10px;
  }

  .card{
    background:linear-gradient(180deg, rgba(255,255,255,.03), transparent), var(--burgundy-deep);
    border:1px solid rgba(212,185,106,.35);
    border-radius:6px;
    padding:22px 20px 24px;
    position:relative;
  }
  .card::before{
    content:'';
    position:absolute;
    inset:6px;
    border:1px solid rgba(212,185,106,.15);
    border-radius:3px;
    pointer-events:none;
  }

  #joinForm{
    display:flex;
    gap:8px;
    margin-bottom:8px;
  }
  input[type="text"]{
    flex:1;
    min-width:0;
    background:var(--burgundy-deepest);
    border:1px solid var(--gold-deep);
    color:var(--cream);
    font-family:'Cormorant Garamond', serif;
    font-size:16px;
    padding:11px 13px;
    border-radius:4px;
    outline:none;
  }
  input[type="text"]:focus{
    border-color:var(--gold);
    box-shadow:0 0 8px rgba(212,185,106,.3);
  }

  button{
    font-family:'Cinzel', serif;
    font-size:13px;
    letter-spacing:.06em;
    background:var(--gold);
    color:var(--burgundy-deepest);
    border:none;
    padding:11px 20px;
    border-radius:4px;
    cursor:pointer;
    transition:filter .15s ease, transform .1s ease;
    white-space:nowrap;
  }
  button:hover{ filter:brightness(1.1); }
  button:active{ transform:translateY(1px); }
  button.secondary{
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold-deep);
  }
  button:disabled{
    opacity:.5;
    cursor:not-allowed;
  }

  .form-msg{
    font-size:14px;
    color:var(--cream-dim);
    font-style:italic;
    min-height:18px;
    margin-bottom:6px;
  }
  .form-msg.success{
    color:var(--gold);
    font-style:normal;
    font-weight:600;
  }
  .form-msg.error{
    color:#e0a3a3;
  }

  .toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:14px 0;
  }
  .toolbar h2{
    font-family:'Cinzel', serif;
    font-size:16px;
    letter-spacing:.06em;
    color:var(--gold);
    margin:0;
  }
  .summary-line{
    font-size:14px;
    color:var(--cream-dim);
    margin-bottom:14px;
  }
  .summary-line strong{ color:var(--gold); }

  #teamsContainer{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(230px,1fr));
    gap:12px;
  }
  .team-box{
    background:rgba(0,0,0,.16);
    border:1px solid rgba(212,185,106,.25);
    border-radius:5px;
    padding:14px 14px 12px;
  }
  .team-box h3{
    font-family:'Cinzel', serif;
    font-size:14px;
    letter-spacing:.05em;
    color:var(--gold);
    margin:0 0 10px;
  }
  .team-box h3 .team-sub{
    font-size:11px;
    color:var(--cream-dim);
    font-weight:normal;
    letter-spacing:0;
    opacity:.75;
  }

  .member-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:7px 0;
    border-bottom:1px solid rgba(212,185,106,.1);
    font-size:15px;
  }
  .member-row:last-child{ border-bottom:none; }
  .member-name{
    flex:1;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .member-row.paused .member-name{
    text-decoration:line-through;
    color:var(--cream-dim);
    opacity:.7;
  }
  .pause-pill{
    font-size:10px;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:#e0a3a3;
    border:1px solid #e0a3a3;
    border-radius:10px;
    padding:2px 7px;
    margin-left:6px;
    flex-shrink:0;
  }
  .toggle-btn{
    font-family:'Cinzel', serif;
    font-size:11px;
    letter-spacing:.03em;
    background:transparent;
    border:1px solid var(--gold-deep);
    color:var(--cream-dim);
    padding:4px 10px;
    border-radius:12px;
    cursor:pointer;
    flex-shrink:0;
  }
  .toggle-btn:hover{
    background:var(--burgundy-light);
    color:var(--cream);
  }
  .toggle-btn.is-paused{
    border-color:var(--gold);
    color:var(--gold);
  }

  .empty-hint{
    color:var(--cream-dim);
    font-style:italic;
    font-size:15px;
    opacity:.7;
    text-align:center;
    padding:10px 0;
  }

  footer{
    text-align:center;
    padding:26px 10px 4px;
  }

  @media (max-width:420px){
    .corner{ width:38px; height:38px; }
    header{ padding-top:26px; }
    .card{ padding:18px 14px 20px; }
  }
</style>
</head>
<body>

<div class="frame">
  <div class="corner corner-tl"><svg viewBox="0 0 100 100"><path d="M4 4 C4 40, 40 4, 60 4 M4 4 C40 4, 4 40, 4 60" fill="none" stroke="#d4b96a" stroke-width="2"/><circle cx="4" cy="4" r="3" fill="#d4b96a"/><path d="M18 4 C18 14, 8 14, 8 24" fill="none" stroke="#d4b96a" stroke-width="1.3"/></svg></div>
  <div class="corner corner-tr"><svg viewBox="0 0 100 100"><path d="M4 4 C4 40, 40 4, 60 4 M4 4 C40 4, 4 40, 4 60" fill="none" stroke="#d4b96a" stroke-width="2"/><circle cx="4" cy="4" r="3" fill="#d4b96a"/><path d="M18 4 C18 14, 8 14, 8 24" fill="none" stroke="#d4b96a" stroke-width="1.3"/></svg></div>
  <div class="corner corner-bl"><svg viewBox="0 0 100 100"><path d="M4 4 C4 40, 40 4, 60 4 M4 4 C40 4, 4 40, 4 60" fill="none" stroke="#d4b96a" stroke-width="2"/><circle cx="4" cy="4" r="3" fill="#d4b96a"/><path d="M18 4 C18 14, 8 14, 8 24" fill="none" stroke="#d4b96a" stroke-width="1.3"/></svg></div>
  <div class="corner corner-br"><svg viewBox="0 0 100 100"><path d="M4 4 C4 40, 40 4, 60 4 M4 4 C40 4, 4 40, 4 60" fill="none" stroke="#d4b96a" stroke-width="2"/><circle cx="4" cy="4" r="3" fill="#d4b96a"/><path d="M18 4 C18 14, 8 14, 8 24" fill="none" stroke="#d4b96a" stroke-width="1.3"/></svg></div>

  <header>
    <div class="eyebrow">Gerade am Spielen</div>
    <h1>Mitspielen?</h1>
    <p class="intro">Trag dich hier ein — du wirst automatisch dem Team zugeteilt, das gerade am wenigsten aktive Leute hat. Willst du kurz eine Pause, pausierst du dich einfach, dein Team bleibt dir erhalten.</p>
    <div class="divider"><span class="diamond"></span></div>
  </header>

  <main>
    <section class="card">
      <form id="joinForm">
        <input type="text" id="nameInput" placeholder="Wie heißt du?" autocomplete="name" maxlength="30">
        <button type="submit">Eintragen</button>
      </form>
      <div class="form-msg" id="formMsg"></div>

      <div class="toolbar">
        <h2>Teams</h2>
        <button type="button" class="secondary" id="refreshBtn">Aktualisieren</button>
      </div>
      <div class="summary-line" id="summaryLine"></div>
      <div id="teamsContainer"></div>
    </section>
  </main>

  <footer>
    <div class="divider"><span class="diamond"></span></div>
  </footer>
</div>

<script>
(function(){
  "use strict";

  // ---- Konfiguration ----
  var FIREBASE_URL = "https://maskenball-28994-default-rtdb.europe-west1.firebasedatabase.app"; // OHNE Slash am Ende
  var TEAM_COUNT = 2; // Anzahl Teams, vor dem Fest final einstellen
  var AUTO_REFRESH_MS = 6000;
  // ------------------------

  var joinForm = document.getElementById('joinForm');
  var nameInput = document.getElementById('nameInput');
  var formMsg = document.getElementById('formMsg');
  var refreshBtn = document.getElementById('refreshBtn');
  var teamsContainer = document.getElementById('teamsContainer');
  var summaryLine = document.getElementById('summaryLine');

  function firebaseConfigured(){
    return FIREBASE_URL.indexOf('DEIN_PROJEKT') === -1;
  }

  function setMsg(text, kind){
    formMsg.textContent = text;
    formMsg.className = 'form-msg' + (kind ? ' ' + kind : '');
  }

  function renderTeams(players){
    var keys = Object.keys(players);
    var maxTeam = TEAM_COUNT;
    keys.forEach(function(k){
      var t = players[k].team;
      if(typeof t === 'number' && t > maxTeam){ maxTeam = t; }
    });

    var activeTotal = 0, pausedTotal = 0;
    keys.forEach(function(k){ players[k].paused ? pausedTotal++ : activeTotal++; });
    summaryLine.innerHTML = '<strong>' + activeTotal + '</strong> aktiv, <strong>' + pausedTotal + '</strong> pausiert, <strong>' + keys.length + '</strong> insgesamt';

    teamsContainer.innerHTML = '';
    for(var teamNum = 1; teamNum <= maxTeam; teamNum++){
      var members = keys
        .filter(function(k){ return players[k].team === teamNum; })
        .map(function(k){ return { key: k, name: players[k].name || '', paused: !!players[k].paused }; })
        .sort(function(a, b){
          if(a.paused !== b.paused){ return a.paused ? 1 : -1; }
          return a.name.localeCompare(b.name, 'de');
        });

      var activeCount = members.filter(function(m){ return !m.paused; }).length;

      var box = document.createElement('div');
      box.className = 'team-box';
      var h3 = document.createElement('h3');
      h3.textContent = 'Team ' + teamNum + ' ';
      var sub = document.createElement('span');
      sub.className = 'team-sub';
      sub.textContent = activeCount < members.length
        ? '(' + activeCount + ' aktiv / ' + members.length + ')'
        : '(' + members.length + ')';
      h3.appendChild(sub);
      box.appendChild(h3);

      if(members.length === 0){
        var hint = document.createElement('div');
        hint.className = 'empty-hint';
        hint.textContent = 'Noch niemand hier.';
        box.appendChild(hint);
      } else {
        members.forEach(function(m){
          var row = document.createElement('div');
          row.className = 'member-row' + (m.paused ? ' paused' : '');

          var nameSpan = document.createElement('span');
          nameSpan.className = 'member-name';
          nameSpan.textContent = m.name;
          if(m.paused){
            var pill = document.createElement('span');
            pill.className = 'pause-pill';
            pill.textContent = 'Pausiert';
            nameSpan.appendChild(pill);
          }

          var toggleBtn = document.createElement('button');
          toggleBtn.className = 'toggle-btn' + (m.paused ? ' is-paused' : '');
          toggleBtn.textContent = m.paused ? 'Zurück' : 'Pausieren';
          toggleBtn.addEventListener('click', function(key, paused){
            return function(){ togglePause(key, paused); };
          }(m.key, m.paused));

          row.appendChild(nameSpan);
          row.appendChild(toggleBtn);
          box.appendChild(row);
        });
      }

      teamsContainer.appendChild(box);
    }
  }

  function loadPlayers(){
    if(!firebaseConfigured()){
      setMsg('Datenbank noch nicht eingerichtet.', 'error');
      return;
    }
    fetch(FIREBASE_URL + '/spieler.json')
      .then(function(res){
        if(!res.ok){ throw new Error('Ladefehler'); }
        return res.json();
      })
      .then(function(data){
        renderTeams(data || {});
      })
      .catch(function(){
        summaryLine.textContent = 'Liste konnte gerade nicht geladen werden.';
      });
  }

  function pickTeamForNewPlayer(players){
    var counts = {};
    for(var i = 1; i <= TEAM_COUNT; i++){ counts[i] = 0; }
    Object.keys(players).forEach(function(k){
      var p = players[k];
      if(!p.paused && p.team >= 1 && p.team <= TEAM_COUNT){
        counts[p.team]++;
      }
    });
    var minCount = Math.min.apply(null, Object.keys(counts).map(function(t){ return counts[t]; }));
    var candidates = Object.keys(counts).filter(function(t){ return counts[t] === minCount; });
    var chosen = candidates[Math.floor(Math.random() * candidates.length)];
    return parseInt(chosen, 10);
  }

  function addPlayer(name){
    fetch(FIREBASE_URL + '/spieler.json')
      .then(function(res){ return res.json(); })
      .then(function(data){
        var players = data || {};
        var exists = Object.keys(players).some(function(key){
          return (players[key].name || '').toLowerCase() === name.toLowerCase();
        });
        if(exists){
          setMsg('„' + name + '" ist schon in der Liste.', 'error');
          return;
        }
        var team = pickTeamForNewPlayer(players);
        return fetch(FIREBASE_URL + '/spieler.json', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, team: team, paused: false })
        }).then(function(res){
          if(!res.ok){ throw new Error('Schreibfehler'); }
          setMsg('Du bist jetzt in Team ' + team + '!', 'success');
          nameInput.value = '';
          loadPlayers();
        });
      })
      .catch(function(){
        setMsg('Eintragen hat gerade nicht geklappt, versuch es noch einmal.', 'error');
      });
  }

  function togglePause(key, currentlyPaused){
    fetch(FIREBASE_URL + '/spieler/' + key + '.json', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paused: !currentlyPaused })
    })
      .then(function(){ loadPlayers(); })
      .catch(function(){
        setMsg('Das hat gerade nicht geklappt, versuch es noch einmal.', 'error');
      });
  }

  joinForm.addEventListener('submit', function(e){
    e.preventDefault();
    var name = nameInput.value.trim();
    if(!name){ return; }
    if(!firebaseConfigured()){
      setMsg('Datenbank noch nicht eingerichtet.', 'error');
      return;
    }
    setMsg('', '');
    addPlayer(name);
  });

  refreshBtn.addEventListener('click', loadPlayers);

  loadPlayers();
  setInterval(loadPlayers, AUTO_REFRESH_MS);
})();
</script>
</body>
</html>
